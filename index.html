<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aider Agent - 代码图谱 (Repo Map) 上下文动态裁剪演示</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(13, 17, 23, 0.8);
            --primary: #3b82f6; /* 科技蓝 */
            --accent: #8b5cf6; /* 算法紫 */
            --success: #10b981; /* 成功绿 */
            --danger: #ef4444; /* 警告红 */
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            overflow: hidden;
        }

        /* --- 核心布局：左侧控制台，右侧图谱画布 --- */
        .dashboard {
            width: 95%;
            max-width: 1400px;
            height: 85vh;
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 左侧终端栏 */
        .terminal-panel { flex: 4; }
        /* 右侧可视化图谱 */
        .graph-panel { flex: 6; position: relative; }

        .panel-header {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* --- STREAMING_CHUNK:终端日志与按钮样式 --- */
        .log-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .log-msg { opacity: 0; transform: translateX(-10px); animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .log-user { color: #fff; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; border-left: 3px solid var(--primary); }
        .log-sys { color: var(--text-muted); font-size: 0.85rem; }
        .log-agent { color: var(--accent); font-weight: bold; }
        .log-success { color: var(--success); }
        .log-warn { color: #f59e0b; }

        .run-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .run-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }
        .run-btn:disabled { background: #334155; box-shadow: none; cursor: not-allowed; transform: none; color: #94a3b8;}

        /* --- STREAMING_CHUNK:Canvas可视化区域与状态栏 --- */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .status-overlay {
            position: absolute;
            bottom: 20px; left: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.5s;
            backdrop-filter: blur(5px);
        }

        .token-bar-container { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; position: relative;}
        .token-bar { height: 100%; width: 0%; background: var(--success); transition: width 0.5s ease, background-color 0.3s ease; }
        .token-limit-marker { position: absolute; top: 0; bottom: 0; left: 80%; width: 2px; background: var(--danger); box-shadow: 0 0 5px var(--danger); z-index: 10;}
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-family: 'Fira Code', monospace; }
        .highlight-word { background: rgba(139, 92, 246, 0.2); color: #d8b4fe; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(139, 92, 246, 0.4); }
    </style>
</head>
<body>

    <div class="mb-4 text-center mt-6">
        <h1 class="text-3xl font-bold tracking-wider mb-2" style="color:var(--text-main); text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);">Aider 代码图谱 (Repo Map) 动态检索演示</h1>
        <p class="text-gray-400 text-sm">基于 NetworkX 与 PageRank 算法，实现 LLM 长上下文的 <b class="text-blue-400">Token 二分裁剪</b> 与精准召回</p>
    </div>

    <div class="dashboard">
        <!-- 左侧终端 -->
        <div class="panel terminal-panel">
            <div class="panel-header">
                <div><i class="fa-solid fa-terminal text-blue-400 mr-2"></i> Agent Inference Console</div>
                <button id="runBtn" class="run-btn" onclick="startDemo()">
                    <i class="fa-solid fa-play mr-1"></i> 启动链路
                </button>
            </div>
            <div class="log-container" id="logBox">
                <div class="log-msg log-sys text-center mt-10">
                    <i class="fa-solid fa-project-diagram text-5xl mb-4" style="color: rgba(255,255,255,0.1);"></i>
                    <p>代码图谱分析引擎已就绪。</p>
                    <p class="text-xs mt-2">点击「启动链路」模拟真实查Bug场景</p>
                </div>
            </div>
        </div>

        <!-- 右侧画布 -->
        <div class="panel graph-panel">
            <div class="panel-header">
                <div><i class="fa-solid fa-network-wired text-purple-400 mr-2"></i> AST Dependency Graph</div>
                <div class="text-xs"><span class="w-2 h-2 rounded-full bg-blue-500 inline-block mr-1"></span>Node <span class="w-2 h-2 rounded-full bg-green-500 inline-block ml-3 mr-1"></span>In Context</div>
            </div>
            <canvas id="graphCanvas"></canvas>
            
            <!-- 底部状态监控悬浮窗 -->
            <div class="status-overlay" id="statusOverlay">
                <div class="flex-between mb-1">
                    <span class="text-gray-300"><i class="fa-solid fa-microchip text-purple-400 mr-1"></i> 二分搜索 Token 预算裁剪 (Limit: 8k)</span>
                    <span id="tokenCounter" class="text-green-400 font-bold">0 / 8000 Tokens</span>
                </div>
                <div class="token-bar-container">
                    <div class="token-limit-marker" title="Max Budget: 8000"></div>
                    <div class="token-bar" id="tokenBar"></div>
                </div>
                <div class="flex-between text-gray-500 text-xs">
                    <span id="clipStatus">Status: Waiting for AST scan...</span>
                    <span>Cost: ~$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('logBox');
        const runBtn = document.getElementById('runBtn');
        const statusOverlay = document.getElementById('statusOverlay');
        const tokenBar = document.getElementById('tokenBar');
        const tokenCounter = document.getElementById('tokenCounter');
        const clipStatus = document.getElementById('clipStatus');

        let animationId;
        
        // 缩放适配
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - 45; // 减去header高度
        }
        window.addEventListener('resize', resize);
        resize();

        // 模拟博世智能驾驶底层代码库节点
        const nodes = [
            { id: 'main', label: 'auto_drive_main.py', x: 0.5, y: 0.2, weight: 0, state: 'idle', tokens: 800 },
            { id: 'target', label: 'traffic_light_detector.py', x: 0.5, y: 0.5, weight: 0, state: 'idle', tokens: 1200 }, // 用户提问的核心
            { id: 'cam', label: 'camera_sensor.py', x: 0.2, y: 0.4, weight: 0, state: 'idle', tokens: 1500 },
            { id: 'img', label: 'image_processor.py', x: 0.3, y: 0.7, weight: 0, state: 'idle', tokens: 2500 },
            { id: 'radar', label: 'lidar_fusion.py', x: 0.8, y: 0.4, weight: 0, state: 'idle', tokens: 3000 },
            { id: 'brake', label: 'brake_controller.py', x: 0.8, y: 0.7, weight: 0, state: 'idle', tokens: 1800 },
            { id: 'utils', label: 'math_utils.py', x: 0.2, y: 0.8, weight: 0, state: 'idle', tokens: 900 },
            { id: 'db', label: 'fct_log_db.py', x: 0.8, y: 0.15, weight: 0, state: 'idle', tokens: 1100 },
            { id: 'config', label: 'sys_config.yaml', x: 0.2, y: 0.15, weight: 0, state: 'idle', tokens: 400 }
        ];

        // 依赖连线 (from imports to)
        const edges = [
            { source: 'main', target: 'target' }, { source: 'main', target: 'cam' },
            { source: 'main', target: 'radar' }, { source: 'main', target: 'config' },
            { source: 'target', target: 'img' }, { source: 'cam', target: 'img' },
            { source: 'img', target: 'utils' }, { source: 'radar', target: 'brake' },
            { source: 'main', target: 'db' }, { source: 'target', target: 'config' }
        ];

        let pulseRadius = 0;
        let isPulsing = false;
        
        // --- 核心绘制循环 ---
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width;
            const h = canvas.height;

            // 1. 绘制连线
            edges.forEach(edge => {
                const s = nodes.find(n => n.id === edge.source);
                const t = nodes.find(n => n.id === edge.target);
                
                ctx.beginPath();
                ctx.moveTo(s.x * w, s.y * h);
                ctx.lineTo(t.x * w, t.y * h);
                
                // 连线颜色逻辑：如果两端都被选中，则高亮
                if(s.state === 'selected' && t.state === 'selected') {
                    ctx.strokeStyle = 'rgba(16, 185, 129, 0.6)'; // 绿色
                    ctx.lineWidth = 2;
                } else if(s.state !== 'idle' || t.state !== 'idle') {
                    ctx.strokeStyle = 'rgba(139, 92, 246, 0.4)'; // 紫色过渡
                    ctx.lineWidth = 1.5;
                } else {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                }
                ctx.stroke();
            });

            // 2. 绘制 PageRank 扩散脉冲波纹
            if (isPulsing) {
                const centerNode = nodes.find(n => n.id === 'target');
                ctx.beginPath();
                ctx.arc(centerNode.x * w, centerNode.y * h, pulseRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(139, 92, 246, ${Math.max(0, 1 - pulseRadius/300)})`;
                ctx.lineWidth = 4;
                ctx.stroke();
                pulseRadius += 4;
                if (pulseRadius > 400) pulseRadius = 0;
            }

            // 3. 绘制节点
            nodes.forEach(node => {
                const nx = node.x * w;
                const ny = node.y * h;
                
                ctx.beginPath();
                ctx.arc(nx, ny, 12 + (node.weight * 5), 0, Math.PI * 2);
                
                // 节点颜色状态机
                if (node.state === 'target') {
                    ctx.fillStyle = '#ef4444'; // 红心
                    ctx.shadowColor = '#ef4444';
                    ctx.shadowBlur = 15;
                } else if (node.state === 'selected') {
                    ctx.fillStyle = '#10b981'; // 绿入选
                    ctx.shadowColor = '#10b981';
                    ctx.shadowBlur = 10;
                } else if (node.state === 'calculating') {
                    ctx.fillStyle = '#8b5cf6'; // 紫计算
                    ctx.shadowColor = '#8b5cf6';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = '#334155'; // 灰默认
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
                
                // 绘制节点标签与权重
                ctx.fillStyle = (node.state !== 'idle') ? '#fff' : '#64748b';
                ctx.font = "12px 'Fira Code'";
                ctx.textAlign = "center";
                ctx.fillText(node.label, nx, ny - 20);
                
                if(node.weight > 0) {
                    ctx.fillStyle = '#a855f7';
                    ctx.font = "bold 10px 'Inter'";
                    ctx.fillText(`Rank: ${node.weight.toFixed(2)}`, nx, ny + 24);
                }
            });

            animationId = requestAnimationFrame(drawGraph);
        }
        
        // 初始启动绘制
        drawGraph();

        // --- STREAMING_CHUNK:Agent 演示业务流逻辑 ---
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const appendLog = (html) => {
            const div = document.createElement('div');
            div.className = 'log-msg';
            div.innerHTML = html;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        };

        async function startDemo() {
            // 初始化
            runBtn.disabled = true;
            runBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> 处理中';
            logBox.innerHTML = '';
            statusOverlay.style.opacity = '1';
            nodes.forEach(n => { n.state = 'idle'; n.weight = 0; });
            tokenBar.style.width = '0%';
            tokenBar.style.backgroundColor = 'var(--success)';
            tokenCounter.innerText = `0 / 8000 Tokens`;
            clipStatus.innerText = 'Status: Waiting...';
            isPulsing = false; pulseRadius = 0;

            // 1. 用户提问
            await sleep(500);
            appendLog(`<div class="log-user"><i class="fa-solid fa-user-astronaut text-blue-300 mr-2"></i><b>需求:</b> "帮我修复一下红绿灯检测模块在过路口时的空指针异常 (NPE)"</div>`);
            
            // 2. 传统检索痛点
            await sleep(1000);
            appendLog(`<div class="log-sys"><i class="fa-solid fa-triangle-exclamation text-red-400 mr-2"></i> <b>传统向量检索 (RAG):</b> 召回了所有带"红绿灯"和"空指针"的文件，总计 24 个。</div>`);
            appendLog(`<div class="log-warn"><i class="fa-solid fa-ban mr-2"></i> 预计耗费 Token: <span class="text-red-400">45,200</span> (超出 8k 预算窗口，大模型极易产生幻觉和遗忘)</div>`);

            // 3. 启用 NetworkX 图谱
            await sleep(1500);
            appendLog(`<div class="log-agent"><i class="fa-solid fa-robot mr-2"></i> Aider Agent 接管，启用 NetworkX 代码图谱召回策略</div>`);
            appendLog(`<div class="log-sys"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i> [Step 1] 解析全局 AST 抽象语法树，构建 Repo Map...</div>`);
            await sleep(1000);
            
            // 4. 定位锚点与 PageRank 扩散
            const targetNode = nodes.find(n => n.id === 'target');
            targetNode.state = 'target'; // 变红
            appendLog(`<div class="log-sys pl-6">└─ 锚点锁定: 基于用户当前查看及报错栈，赋予 <span class="highlight-word">traffic_light_detector.py</span> 最高初始个性化权重 (Personalized Vector)。</div>`);
            
            await sleep(1200);
            appendLog(`<div class="log-agent"><i class="fa-solid fa-share-nodes mr-2"></i> [Step 2] 运行 PageRank 算法，沿依赖图谱辐射计算上下文重要度...</div>`);
            isPulsing = true; // 开启脉冲动画
            
            // 模拟 PageRank 权重分配动画
            nodes.forEach(n => { if(n.id !== 'target') n.state = 'calculating'; });
            await sleep(1000);
            
            // 预设收敛权重
            const weights = {'target': 1.0, 'img': 0.85, 'cam': 0.65, 'main': 0.5, 'config': 0.4, 'utils': 0.3, 'db': 0.1, 'radar': 0.05, 'brake': 0.02};
            nodes.forEach(n => { 
                n.weight = weights[n.id]; 
                if(n.id !== 'target') n.state = 'idle';
            });
            await sleep(500);
            isPulsing = false;
            
            // 5. 二分搜索 Token 裁剪
            appendLog(`<div class="log-agent"><i class="fa-solid fa-scissors mr-2"></i> [Step 3] 启动二分搜索 (Binary Search) 动态裁剪，装载 Token 预算：8000。</div>`);
            clipStatus.innerText = 'Status: Binary searching optimal context threshold...';
            
            // 按权重排序文件列表
            const sortedNodes = [...nodes].sort((a,b) => b.weight - a.weight);
            let currentTokens = 0;
            const maxTokens = 8000;

            await sleep(1000);
            
            // 模拟逐渐加入上下文
            for (let i = 0; i < sortedNodes.length; i++) {
                const node = sortedNodes[i];
                if (currentTokens + node.tokens <= maxTokens) {
                    node.state = 'selected'; // 变绿
                    currentTokens += node.tokens;
                    
                    // UI 更新
                    const percent = (currentTokens / 10000) * 100; // 这里的10000是进度条满刻度，8k是红线(80%)
                    tokenBar.style.width = `${percent}%`;
                    tokenCounter.innerText = `${currentTokens} / 8000 Tokens`;
                    
                    if (currentTokens > 6000) tokenBar.style.backgroundColor = '#f59e0b'; // 接近极限变黄
                    
                    appendLog(`<div class="log-sys pl-6 text-green-300">└─ ➕ 选入: ${node.label} (Rank: ${node.weight.toFixed(2)}, +${node.tokens} tks)</div>`);
                    await sleep(800);
                } else {
                    appendLog(`<div class="log-sys pl-6 text-gray-500">└─ ✂️ 裁剪: ${node.label} (超出预算，仅保留函数签名)</div>`);
                    await sleep(400);
                }
            }

            // 6. 完成生成
            await sleep(1000);
            clipStatus.innerText = 'Status: Context ready. Routing to LLM.';
            clipStatus.classList.add('text-green-400');
            
            appendLog(`<div class="log-success mt-2"><i class="fa-solid fa-check-circle mr-2"></i> <b>召回优化完成！</b></div>`);
            appendLog(`<div class="log-sys">在 <b>8000</b> Token 的安全预算内，完美拼装了具备完整逻辑闭环的核心依赖树。彻底消除长文本幻觉，并大幅节约大模型推理成本。</div>`);

            // 重置按钮
            await sleep(500);
            runBtn.disabled = false;
            runBtn.innerHTML = '<i class="fa-solid fa-rotate-right mr-1"></i> 重新演示';
        }
    </script>
</body>
</html>
